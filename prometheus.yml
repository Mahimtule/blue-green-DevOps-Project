global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'blue-app'
    metrics_path: /metrics
    static_configs:
      - targets: ['blue-app:3000']

  - job_name: 'green-app'
    metrics_path: /metrics
    static_configs:
      - targets: ['green-app:3000']
